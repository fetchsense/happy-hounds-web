# Deploys the static marketing + interest-form pages to GitHub Pages.
# API routes, the booking system, and the admin view require a Node.js server
# and are NOT included here — they need Vercel (or another host). See README.
#
# Trigger: manual only (workflow_dispatch). Auto-deploy on push is intentionally
# disabled because the main deploy target is Vercel once the CEO sets it up.

on:
  workflow_dispatch:

name: Deploy to GitHub Pages

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Remove server-only routes (not supported by static export)
        run: rm -rf app/api app/admin app/booking/confirmation
      - run: npm run build
        env:
          GITHUB_PAGES_BUILD: "true"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
