# DEPRECATED — this workflow was used when the site was a static marketing site
# hosted on GitHub Pages.
#
# The booking system (HAPA-4) requires server-side rendering and API routes,
# which GitHub Pages cannot serve. The site now needs to be deployed to Vercel
# (or another Node.js host with a persistent volume for the SQLite database).
#
# See README.md "Deploying" for the Vercel migration steps.
# Once the CEO has set up the Vercel project, this workflow can be removed.
#
# This workflow is intentionally disabled (no trigger events) so it does not
# run and does not block the repo's GitHub Pages environment.

on: {}  # disabled

name: Deploy to GitHub Pages (deprecated)

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  note:
    runs-on: ubuntu-latest
    steps:
      - run: echo "This workflow is deprecated. Deploy to Vercel instead."
